name: ecotrack
description: EcoTrack - Gestion intelligente des déchets
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  google_fonts: ^6.1.0
  flutter_map: ^7.0.0
  flutter_svg: ^2.0.10+1
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  image_picker: ^1.0.0
  speech_to_text: ^7.4.0
  shared_preferences: ^2.2.0
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
