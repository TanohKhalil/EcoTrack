  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;color:var(--text);flex:1\">Mobile Money<\u002Fspan><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2.5\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"pay-opt2\" onclick=\"setPayOpt2(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:11px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(var(--text-rgb),.6)\" stroke-width=\"1.8\"><path d=\"M12 2 3 7v10l9 5 9-5V7z\"><\u002Fpath><\u002Fsvg><span style=\"font:600 13px 'Space Grotesk';color:var(--text);flex:1\">Espèces à la livraison<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn-primary\" onclick=\"go('confirmation_commande')\">Confirmer la commande<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ CONFIRMATION COMMANDE ============ -->\n    <div class=\"screen\" data-screen=\"confirmation_commande\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center\">\n        <div style=\"width:88px;height:88px;border-radius:50%;background:rgba(var(--accent-rgb),.14);border:1px solid rgba(var(--accent-rgb),.4);display:flex;align-items:center;justify-content:center;margin-bottom:24px\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h1 style=\"font:600 24px 'Space Grotesk';color:var(--text);margin:0 0 10px\">Commande confirmée<\u002Fh1>\n        <p style=\"font:400 13px/1.6 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin:0 0 30px\">Vous recevrez un SMS avec les détails de livraison ou de retrait.<\u002Fp>\n        <button class=\"btn-primary\" onclick=\"clearCart(); go('marketplace')\">Retour à la marketplace<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ LANGUE ============ -->\n    <div class=\"screen\" data-screen=\"langue\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:6px 26px 34px\">\n        <button class=\"icon-btn\" onclick=\"go('parametres')\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.65);margin:22px 0 8px\">Langue<\u002Fdiv>\n        <h1 style=\"font:600 24px 'Space Grotesk';color:var(--text);margin:0 0 20px\">Choisir la langue<\u002Fh1>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <div class=\"lang-opt active\" onclick=\"setLang(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.4);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:600 13.5px 'Space Grotesk';color:var(--text)\">Français<\u002Fspan><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2.5\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"lang-opt\" onclick=\"setLang(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:600 13.5px 'Space Grotesk';color:var(--text)\">English<\u002Fspan><\u002Fdiv>\n          <div class=\"lang-opt\" onclick=\"setLang(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:600 13.5px 'Space Grotesk';color:var(--text)\">Dioula<\u002Fspan><\u002Fdiv>\n          <div class=\"lang-opt\" onclick=\"setLang(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:600 13.5px 'Space Grotesk';color:var(--text)\">Baoulé<\u002Fspan><\u002Fdiv>\n          <div class=\"lang-opt\" onclick=\"setLang(this)\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:600 13.5px 'Space Grotesk';color:var(--text)\">Nouchi<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ PARAMÈTRES DU COMPTE ============ -->\n    <div class=\"screen\" data-screen=\"parametres\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:6px 22px 34px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px\"><button class=\"icon-btn\" onclick=\"go('profil')\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><h1 style=\"font:600 19px 'Space Grotesk';color:var(--text);margin:0\">Paramètres<\u002Fh1><\u002Fdiv>\n\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:10px\">INFORMATIONS PERSONNELLES<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;min-width:0\">\n          <input value=\"Aya\" style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.16);border-radius:12px;padding:13px 14px;color:var(--text);font:400 13px 'Space Grotesk';width:100%;min-width:0;box-sizing:border-box;outline:none\">\n          <input value=\"Konan\" style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.16);border-radius:12px;padding:13px 14px;color:var(--text);font:400 13px 'Space Grotesk';width:100%;min-width:0;box-sizing:border-box;outline:none\">\n        <\u002Fdiv>\n        <input value=\"+225 07 12 34 56 78\" style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.16);border-radius:12px;padding:13px 14px;color:var(--text);font:400 13px 'Space Grotesk';width:100%;box-sizing:border-box;margin-bottom:22px;outline:none\">\n\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:10px\">PRÉFÉRENCES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:22px\">\n          <div onclick=\"go('langue')\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:500 13px 'Space Grotesk';color:var(--text)\">Langue<\u002Fspan><span style=\"font:400 12px 'Space Grotesk';color:rgba(var(--text-rgb),.45)\">Français ›<\u002Fspan><\u002Fdiv>\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:500 13px 'Space Grotesk';color:var(--text)\">Notifications push<\u002Fspan><div onclick=\"toggleSwitch(this)\" data-on=\"1\" style=\"width:40px;height:22px;border-radius:11px;background:var(--accent);position:relative;cursor:pointer\"><div style=\"width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;transition:all .2s\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:500 13px 'Space Grotesk';color:var(--text)\">Mode hors-ligne<\u002Fspan><div onclick=\"toggleOfflineSwitch(this)\" data-on=\"0\" style=\"width:40px;height:22px;border-radius:11px;background:rgba(var(--text-rgb),.2);position:relative;cursor:pointer\"><div style=\"width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:all .2s\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:10px\">SUPPORT<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:24px\">\n          <div onclick=\"go('aide')\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:500 13px 'Space Grotesk';color:var(--text)\">Aide &amp; FAQ<\u002Fspan><span style=\"color:rgba(var(--text-rgb),.4)\">›<\u002Fspan><\u002Fdiv>\n          <div onclick=\"go('cgu')\" style=\"cursor:pointer;background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font:500 13px 'Space Grotesk';color:var(--text)\">CGU &amp; confidentialité<\u002Fspan><span style=\"color:rgba(var(--text-rgb),.4)\">›<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn-primary\" onclick=\"showToast('Paramètres enregistrés')\">Enregistrer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ AIDE / FAQ / SUPPORT ============ -->\n    <div class=\"screen\" data-screen=\"aide\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:6px 22px 34px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px\"><button class=\"icon-btn\" onclick=\"go('profil')\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><h1 style=\"font:600 19px 'Space Grotesk';color:var(--text);margin:0\">Aide &amp; FAQ<\u002Fh1><\u002Fdiv>\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:11px\">QUESTIONS FRÉQUENTES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:24px\">\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px\"><div style=\"font:600 12.5px 'Space Grotesk';color:var(--text);margin-bottom:4px\">L'IA se trompe sur mon déchet, que faire ?<\u002Fdiv><div style=\"font:400 11.5px/1.5 'Space Grotesk';color:rgba(var(--text-rgb),.5)\">Utilisez le vote communautaire proposé après le scan pour aider à corriger la classification.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px\"><div style=\"font:600 12.5px 'Space Grotesk';color:var(--text);margin-bottom:4px\">Comment échanger mes points ?<\u002Fdiv><div style=\"font:400 11.5px/1.5 'Space Grotesk';color:rgba(var(--text-rgb),.5)\">Rendez-vous dans l'accueil, section \"Récompenses\", et sélectionnez une offre disponible.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:13px 15px\"><div style=\"font:600 12.5px 'Space Grotesk';color:var(--text);margin-bottom:4px\">L'application fonctionne-t-elle sans réseau ?<\u002Fdiv><div style=\"font:400 11.5px/1.5 'Space Grotesk';color:rgba(var(--text-rgb),.5)\">Oui : activez le mode hors-ligne dans les paramètres. Vos actions se synchroniseront dès que le réseau revient.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:11px\">CONTACTER LE SUPPORT<\u002Fdiv>\n        <textarea placeholder=\"Décrivez votre problème…\" style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.16);border-radius:13px;padding:14px 15px;color:var(--text);font:400 13px 'Space Grotesk';width:100%;min-height:90px;resize:none;margin-bottom:18px\"><\u002Ftextarea>\n        <button class=\"btn-primary\" onclick=\"showToast('Message envoyé au support EcoTrack')\">Envoyer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ CGU / CONFIDENTIALITÉ ============ -->\n    <div class=\"screen\" data-screen=\"cgu\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:6px 22px 34px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\"><button class=\"icon-btn\" onclick=\"go('inscription')\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><h1 style=\"font:600 18px 'Space Grotesk';color:var(--text);margin:0\">CGU &amp; confidentialité<\u002Fh1><\u002Fdiv>\n        <div style=\"font:400 12.5px/1.7 'Space Grotesk';color:rgba(var(--text-rgb),.6)\">\n          <p><b style=\"color:var(--text)\">1. Données collectées.<\u002Fb> EcoTrack collecte votre nom, numéro, localisation approximative et vos historiques de tri afin d'améliorer la collecte et la valorisation des déchets.<\u002Fp>\n          <p><b style=\"color:var(--text)\">2. Usage des photos.<\u002Fb> Les photos de déchets et de signalements sont utilisées pour entraîner le modèle de classification IA et ne sont jamais revendues.<\u002Fp>\n          <p><b style=\"color:var(--text)\">3. Partage institutionnel.<\u002Fb> Des données agrégées et anonymisées peuvent être partagées avec les mairies et partenaires (AFD, PNUD).<\u002Fp>\n          <p><b style=\"color:var(--text)\">4. Vos droits.<\u002Fb> Vous pouvez à tout moment demander l'export ou la suppression de vos données depuis Paramètres → Aide &amp; FAQ.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ ERREUR CAMÉRA ============ -->\n    <div class=\"screen\" data-screen=\"erreur_camera\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center\">\n        <div style=\"width:84px;height:84px;border-radius:50%;background:rgba(var(--danger-rgb),.12);border:1px solid rgba(var(--danger-rgb),.35);display:flex;align-items:center;justify-content:center;margin-bottom:22px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--danger)\" stroke-width=\"1.8\"><path d=\"M1 1l22 22M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h4\"><\u002Fpath><path d=\"M14.5 5h1.7l1.8 3H21a2 2 0 0 1 2 2v8.5\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"3.5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h1 style=\"font:600 21px 'Space Grotesk';color:var(--text);margin:0 0 10px\">Accès à la caméra refusé<\u002Fh1>\n        <p style=\"font:400 13px/1.6 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin:0 0 26px\">EcoTrack a besoin de la caméra pour scanner vos déchets. Autorisez l'accès dans les réglages de votre téléphone.<\u002Fp>\n        <button class=\"btn-primary\" onclick=\"go('scanner')\" style=\"margin-bottom:11px\">Réessayer<\u002Fbutton>\n        <button class=\"btn-ghost\" onclick=\"openGallery()\">Utiliser une photo de la galerie<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ ERREUR RÉSEAU ============ -->\n    <div class=\"screen\" data-screen=\"erreur_reseau\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center\">\n        <div style=\"width:84px;height:84px;border-radius:50%;background:rgba(var(--text-rgb),.08);border:1px solid rgba(var(--text-rgb),.18);display:flex;align-items:center;justify-content:center;margin-bottom:22px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(var(--text-rgb),.6)\" stroke-width=\"1.8\"><path d=\"M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0\"><\u002Fpath><line x1=\"12\" y1=\"20\" x2=\"12.01\" y2=\"20\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h1 style=\"font:600 21px 'Space Grotesk';color:var(--text);margin:0 0 10px\">Pas de connexion<\u002Fh1>\n        <p style=\"font:400 13px/1.6 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin:0 0 26px\">Impossible de joindre le serveur. Activez le mode hors-ligne pour continuer à trier — vos actions se synchroniseront plus tard.<\u002Fp>\n        <button class=\"btn-primary\" onclick=\"showToast('Reconnexion réussie'); go('accueil_menage')\" style=\"margin-bottom:11px\">Réessayer<\u002Fbutton>\n        <button class=\"btn-ghost\" onclick=\"toggleOffline(); go('accueil_menage')\">Continuer hors-ligne<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ SIGNALEMENT DOUBLON ============ -->\n    <div class=\"screen\" data-screen=\"signalement_doublon\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:6px 26px 34px\">\n        <button class=\"icon-btn\" onclick=\"go('signalement')\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <div style=\"width:64px;height:64px;border-radius:50%;background:rgba(var(--gold-rgb),.14);border:1px solid rgba(var(--gold-rgb),.4);display:flex;align-items:center;justify-content:center;margin:20px 0 18px;color:var(--gold)\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h1 style=\"font:600 22px/1.2 'Space Grotesk';color:var(--text);margin:0 0 10px\">Un signalement existe déjà ici<\u002Fh1>\n        <p style=\"font:400 13px/1.6 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin:0 0 24px\">Un dépôt sauvage a été signalé à moins de 50 m de cette position, il y a 3 heures, par un autre usager.<\u002Fp>\n        <div style=\"background:var(--card);border:1px solid rgba(var(--gold-rgb),.24);border-radius:15px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:24px\">\n          <div style=\"width:40px;height:40px;border-radius:11px;flex:none;background:repeating-linear-gradient(45deg,var(--ph-a),var(--ph-a) 7px,var(--ph-b) 7px,var(--ph-b) 14px)\"><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:600 12.5px 'Space Grotesk';color:var(--text)\">Voie ferrée, Koumassi<\u002Fdiv><div style=\"font:400 11px 'Space Grotesk';color:rgba(var(--text-rgb),.45)\">Statut : pris en charge par la mairie<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn-ghost\" onclick=\"go('suivi_signalement')\" style=\"margin-bottom:11px\">Voir ce signalement<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"go('confirmation_signalement')\">Signaler quand même<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ FICHE DÉTAILLÉE POINT / FILIÈRE ============ -->\n    <div class=\"screen\" data-screen=\"fiche_point\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;padding:0 0 34px\">\n        <div style=\"position:relative;height:150px;background:repeating-linear-gradient(48deg,var(--ph-a),var(--ph-a) 11px,var(--ph-b) 11px,var(--ph-b) 22px)\">\n          <button class=\"icon-btn\" onclick=\"go('carte')\" style=\"position:absolute;top:12px;left:20px;background:rgba(var(--card-rgb),.85)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 22px 0\">\n          <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.65);margin-bottom:6px\">POINT DE COLLECTE · ORGANIQUE<\u002Fdiv>\n          <h1 style=\"font:600 21px 'Space Grotesk';color:var(--text);margin:0 0 16px\">Bac communautaire — Rue 12<\u002Fh1>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px\">\n            <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:12px\"><div style=\"font:600 15px 'Space Grotesk';color:var(--text)\">42%<\u002Fdiv><div style=\"font:400 10px 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin-top:2px\">remplissage IoT<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:13px;padding:12px\"><div style=\"font:600 15px 'Space Grotesk';color:var(--text)\">6h – 19h<\u002Fdiv><div style=\"font:400 10px 'Space Grotesk';color:rgba(var(--text-rgb),.5);margin-top:2px\">horaires d'accès<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:9px\">DÉCHETS ACCEPTÉS<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px\">\n            <span class=\"chip\" style=\"border:1px solid rgba(var(--organic-rgb),.35);color:var(--organic)\">Épluchures<\u002Fspan>\n            <span class=\"chip\" style=\"border:1px solid rgba(var(--organic-rgb),.35);color:var(--organic)\">Résidus de marché<\u002Fspan>\n            <span class=\"chip\" style=\"border:1px solid rgba(var(--danger-rgb),.3);color:rgba(var(--text-rgb),.5)\">✕ Plastique<\u002Fspan>\n          <\u002Fdiv>\n\n          <div class=\"eyebrow\" style=\"color:rgba(var(--accent-rgb),.55);margin-bottom:9px\">GESTIONNAIRE<\u002Fdiv>\n          <div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:22px\">\n            <div style=\"width:36px;height:36px;border-radius:10px;background:rgba(var(--accent-rgb),.12);display:flex;align-items:center;justify-content:center;color:var(--accent);flex:none\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1\"><div style=\"font:600 12.5px 'Space Grotesk';color:var(--text)\">Mairie de Koumassi<\u002Fdiv><div style=\"font:400 11px 'Space Grotesk';color:rgba(var(--text-rgb),.45)\">Service de propreté urbaine<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n            <button class=\"btn-ghost\" onclick=\"go('signalement')\">Signaler un problème<\u002Fbutton>\n            <button class=\"btn-primary\" onclick=\"showToast('Itinéraire ouvert')\">Itinéraire<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <\u002Fdiv><!-- /viewport -->\n  <\u002Fdiv><!-- /stage -->\n\n  <div style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:390px;margin-top:6px\">\n    <button onclick=\"go('splash')\" class=\"jump\">Splash<\u002Fbutton>\n    <button onclick=\"go('inscription')\" class=\"jump\">Inscription<\u002Fbutton>\n    <button onclick=\"go('infos_perso')\" class=\"jump\">Infos perso<\u002Fbutton>\n    <button onclick=\"go('connexion')\" class=\"jump\">Connexion<\u002Fbutton>\n    <button onclick=\"go('onboarding')\" class=\"jump\">Profils<\u002Fbutton>\n    <button onclick=\"go('accueil_menage')\" class=\"jump\">Ménage<\u002Fbutton>\n    <button onclick=\"go('accueil_collecteur')\" class=\"jump\">Collecteur<\u002Fbutton>\n    <button onclick=\"go('accueil_filiere')\" class=\"jump\">Filière<\u002Fbutton>\n    <button onclick=\"go('dashboard_mairie')\" class=\"jump\">Mairie B2G<\u002Fbutton>\n    <button onclick=\"go('carte')\" class=\"jump\">Carte<\u002Fbutton>\n    <button onclick=\"go('marketplace')\" class=\"jump\">Marketplace<\u002Fbutton>\n    <button onclick=\"go('impact_carbone')\" class=\"jump\">Impact carbone<\u002Fbutton>\n    <button onclick=\"go('assistant_vocal')\" class=\"jump\">Assistant vocal<\u002Fbutton>\n    <button onclick=\"go('historique')\" class=\"jump\">Historique<\u002Fbutton>\n    <button onclick=\"go('suivi_signalement')\" class=\"jump\">Suivi signalement<\u002Fbutton>\n    <button onclick=\"go('notation_collecteur')\" class=\"jump\">Noter collecteur<\u002Fbutton>\n    <button onclick=\"go('tutoriel')\" class=\"jump\">Tutoriel<\u002Fbutton>\n    <button onclick=\"go('vote_communautaire')\" class=\"jump\">Vote IA<\u002Fbutton>\n    <button onclick=\"go('retrait_collecteur')\" class=\"jump\">Retrait FCFA<\u002Fbutton>\n    <button onclick=\"go('panier')\" class=\"jump\">Panier<\u002Fbutton>\n    <button onclick=\"go('parametres')\" class=\"jump\">Paramètres<\u002Fbutton>\n    <button onclick=\"go('aide')\" class=\"jump\">Aide<\u002Fbutton>\n    <button onclick=\"go('fiche_point')\" class=\"jump\">Fiche point<\u002Fbutton>\n    <button onclick=\"go('erreur_camera')\" class=\"jump\">Erreur caméra<\u002Fbutton>\n    <button onclick=\"go('erreur_reseau')\" class=\"jump\">Erreur réseau<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<style>\n  .jump{background:rgba(255,255,255,.06);color:rgba(234,243,236,.65);border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:7px 13px;font:500 11px 'Space Grotesk';cursor:pointer}\n  .jump:hover{background:rgba(52,211,153,.14);color:#fff}\n<\u002Fstyle>\n\n<script>\n  function go(name){\n    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });\n    var el = document.querySelector('[data-screen=\"'+name+'\"]');\n    if(el){ el.classList.add('active'); el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }\n    var vp = document.querySelector('.tv-vp');\n    if(vp) vp.scrollTop = 0;\n    if(name === 'panier' && typeof renderCart === 'function') renderCart();\n  }\n\n  var SUN_ICON = '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4.2\"/><path d=\"M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7\"/><\u002Fsvg>';\n  var MOON_ICON = '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z\"/><\u002Fsvg>';\n\n  function renderThemeIcons(theme){\n    document.querySelectorAll('.theme-toggle').forEach(function(btn){\n      btn.innerHTML = theme === 'dark' ? SUN_ICON : MOON_ICON;\n      btn.title = theme === 'dark' ? 'Passer en mode clair' : 'Passer en mode sombre';\n    });\n  }\n\n  function toggleTheme(){\n    var stage = document.getElementById('stage');\n    var current = stage.getAttribute('data-theme') || 'dark';\n    var next = current === 'dark' ? 'light' : 'dark';\n    stage.setAttribute('data-theme', next);\n    renderThemeIcons(next);\n  }\n\n  renderThemeIcons('dark');\n\n  function setFilter(el){\n    document.querySelectorAll('.map-filter').forEach(function(f){ f.classList.remove('active'); });\n    el.classList.add('active');\n    var filter = el.getAttribute('data-filter');\n    document.querySelectorAll('.map-pin').forEach(function(pin){\n      var cat = pin.getAttribute('data-cat');\n      pin.style.display = (filter === 'tous' || cat === filter) ? '' : 'none';\n    });\n  }\n\n  var CAT_LABELS = {plastique:'PLASTIQUE', organique:'ORGANIQUE', verre:'VERRE / MÉTAL', danger:'DÉPÔT SIGNALÉ'};\n  var CAT_COLORS = {accent:'var(--accent)', gold:'var(--gold)', danger:'var(--danger)', plastic:'var(--plastic)', blue:'var(--blue)'};\n\n  function openPoint(pin){\n    if(!pin) return;\n    var cat = pin.getAttribute('data-cat');\n    var color = pin.getAttribute('data-color');\n    var fill = pin.getAttribute('data-fill');\n    document.getElementById('ptCat').textContent = CAT_LABELS[cat] || 'POINT';\n    document.getElementById('ptCat').style.color = CAT_COLORS[color] || 'var(--accent)';\n    document.getElementById('ptName').textContent = pin.getAttribute('data-name');\n    document.getElementById('ptDist').textContent = pin.getAttribute('data-dist');\n    document.getElementById('ptFill').textContent = fill === '—' ? '—' : fill + '%';\n    document.getElementById('ptHours').textContent = pin.getAttribute('data-hours');\n    document.getElementById('pointSheet').style.transform = 'translateY(0)';\n    var bd = document.getElementById('pointSheetBackdrop');\n    if(bd){ bd.style.opacity = '1'; bd.style.pointerEvents = 'auto'; }\n  }\n\n  function closePoint(){\n    document.getElementById('pointSheet').style.transform = 'translateY(110%)';\n    var bd = document.getElementById('pointSheetBackdrop');\n    if(bd){ bd.style.opacity = '0'; bd.style.pointerEvents = 'none'; }\n  }\n\n  var toastTimer = null;\n  function showToast(msg){\n    var t = document.getElementById('toast');\n    document.getElementById('toastMsg').textContent = msg;\n    t.style.opacity = '1';\n    t.style.transform = 'translateY(0)';\n    clearTimeout(toastTimer);\n    toastTimer = setTimeout(function(){\n      t.style.opacity = '0';\n      t.style.transform = 'translateY(14px)';\n    }, 2400);\n  }\n\n  var mapZoom = 1;\n  function zoomMap(delta){\n    mapZoom = Math.min(1.8, Math.max(0.7, mapZoom + delta));\n    var pins = document.querySelectorAll('.map-pin');\n    var route = document.querySelector('#mapArea svg');\n    document.querySelectorAll('#mapArea > div[style*=\"background-image\"]').forEach(function(grid){\n      grid.style.backgroundSize = (26*mapZoom)+'px '+(26*mapZoom)+'px';\n    });\n    pins.forEach(function(p){ p.style.transform = 'scale('+mapZoom+')'; });\n  }\n  function recenterMap(){\n    mapZoom = 1;\n    document.querySelectorAll('.map-pin').forEach(function(p){ p.style.transform = 'scale(1)'; });\n    document.querySelectorAll('#mapArea > div[style*=\"background-image\"]').forEach(function(grid){\n      grid.style.backgroundSize = '26px 26px';\n    });\n    showToast('Position recentrée sur votre position actuelle');\n  }\n\n  function togglePhoto(el){\n    var added = el.getAttribute('data-added') === '1';\n    if(!added){\n      el.setAttribute('data-added','1');\n      el.style.borderStyle = 'solid';\n      el.style.borderColor = 'rgba(var(--accent-rgb),.5)';\n      el.innerHTML = '<div style=\"text-align:center;color:var(--accent)\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" style=\"margin-bottom:8px\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg><div style=\"font:500 12px \\'Space Grotesk\\'\">Photo ajoutée<\u002Fdiv><\u002Fdiv>';\n    } else {\n      el.setAttribute('data-added','0');\n      el.style.borderStyle = 'dashed';\n      el.style.borderColor = 'rgba(var(--danger-rgb),.4)';\n      el.innerHTML = '<div style=\"text-align:center;color:rgba(var(--text-rgb),.6)\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" style=\"margin-bottom:8px\"><path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"/><circle cx=\"12\" cy=\"13\" r=\"3.5\"/><\u002Fsvg><div style=\"font:500 12px \\'Space Grotesk\\'\">Ajouter une photo<\u002Fdiv><\u002Fdiv>';\n    }\n  }\n\n  function markAllRead(){\n    document.querySelectorAll('.notif-item').forEach(function(n){ n.style.opacity = '.6'; n.querySelector('.notif-dot').style.background = 'rgba(var(--text-rgb),.3)'; });\n    showToast('Toutes les notifications sont marquées comme lues');\n  }\n\n  var cart = [];\n  function orderProduct(name, price){\n    cart.push({name:name, price:price});\n    var badge = document.getElementById('cartBadge');\n    badge.textContent = cart.length;\n    badge.style.display = 'flex';\n    showToast('Ajouté au panier : ' + name);\n  }\n\n  function renderCart(){\n    var list = document.getElementById('cartList');\n    var totalEl = document.getElementById('cartTotal');\n    if(!list) return;\n    if(cart.length === 0){\n      list.innerHTML = '<div style=\"text-align:center;padding:40px 0;color:rgba(var(--text-rgb),.4);font:400 13px \\'Space Grotesk\\'\">Votre panier est vide<\u002Fdiv>';\n      totalEl.textContent = '0 FCFA';\n      return;\n    }\n    var total = 0;\n    list.innerHTML = cart.map(function(item, i){\n      total += item.price;\n      return '<div style=\"background:var(--card);border:1px solid rgba(var(--accent-rgb),.14);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px\">'\n        + '<div style=\"width:44px;height:44px;border-radius:11px;flex:none;background:repeating-linear-gradient(45deg,var(--ph-a),var(--ph-a) 7px,var(--ph-b) 7px,var(--ph-b) 14px)\"><\u002Fdiv>'\n        + '<div style=\"flex:1\"><div style=\"font:600 13px \\'Space Grotesk\\';color:var(--text)\">' + item.name + '<\u002Fdiv><div style=\"font:400 11px \\'Space Grotesk\\';color:rgba(var(--text-rgb),.5)\">' + item.price.toLocaleString('fr-FR') + ' FCFA<\u002Fdiv><\u002Fdiv>'\n        + '<button onclick=\"removeFromCart(' + i + ')\" style=\"background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:16px\">✕<\u002Fbutton>'\n        + '<\u002Fdiv>';\n    }).join('');\n    totalEl.textContent = total.toLocaleString('fr-FR') + ' FCFA';\n  }\n\n  function removeFromCart(i){\n    cart.splice(i,1);\n    renderCart();\n    var badge = document.getElementById('cartBadge');\n    if(cart.length > 0){ badge.textContent = cart.length; } else { badge.style.display = 'none'; }\n  }\n\n  function clearCart(){\n    cart = [];\n    var badge = document.getElementById('cartBadge');\n    if(badge){ badge.style.display = 'none'; }\n  }\n\n  function reserverLot(){\n    showToast('Lot réservé — le collecteur sera notifié');\n  }\n\n  function genererRapport(){\n    showToast('Génération du rapport PDF en cours…');\n  }\n\n  function exporterCertificat(){\n    showToast('Certificat carbone exporté');\n  }\n\n  function openGallery(){\n    showToast('Photo importée depuis la galerie');\n    go('analyse');\n  }\n\n  function filterMapSearch(query){\n    query = query.trim().toLowerCase();\n    document.querySelectorAll('.map-pin').forEach(function(pin){\n      var name = pin.getAttribute('data-name').toLowerCase();\n      pin.style.display = (query === '' || name.indexOf(query) !== -1) ? '' : 'none';\n    });\n    if(query !== ''){\n      document.querySelectorAll('.map-filter').forEach(function(f){ f.classList.remove('active'); });\n      document.querySelector('.map-filter[data-filter=\"tous\"]').classList.add('active');\n    }\n  }\n\n  function setMpFilter(el){\n    document.querySelectorAll('.mp-filter').forEach(function(f){\n      f.classList.remove('active');\n      f.style.background = 'transparent';\n    });\n    el.classList.add('active');\n    el.style.background = 'var(--accent)';\n    var isTous = el.getAttribute('data-cat') === 'tous';\n    if(isTous){ el.style.color = 'var(--accent-ink)'; }\n    var cat = el.getAttribute('data-cat');\n    document.querySelectorAll('.mp-card').forEach(function(card){\n      card.style.display = (cat === 'tous' || card.getAttribute('data-cat') === cat) ? '' : 'none';\n    });\n  }\n\n  function redeemReward(name, cost){\n    showToast('Récompense « ' + name + ' » échangée contre ' + cost + ' points');\n  }\n\n  function playTraining(name){\n    showToast('Lecture de la formation : ' + name);\n  }\n\n  function setInscMethod(el){\n    document.querySelectorAll('.insc-tab').forEach(function(t){\n      t.classList.remove('active');\n      t.style.background = 'transparent';\n      t.style.color = 'rgba(var(--text-rgb),.6)';\n    });\n    el.classList.add('active');\n    el.style.background = 'var(--accent)';\n    el.style.color = 'var(--accent-ink)';\n    var method = el.getAttribute('data-method');\n    document.getElementById('inscTelBlock').style.display = method === 'tel' ? '' : 'none';\n    document.getElementById('inscEmailBlock').style.display = method === 'email' ? '' : 'none';\n  }\n\n  var COMMUNES = ['Cocody, Abidjan', 'Marcory, Abidjan', 'Koumassi, Abidjan', 'Yopougon, Abidjan', 'Treichville, Abidjan'];\n  function detectLocation(textId, subId, boxId){\n    var textEl = document.getElementById(textId);\n    var subEl = document.getElementById(subId);\n    var boxEl = document.getElementById(boxId);\n    textEl.textContent = 'Localisation en cours…';\n    subEl.textContent = 'Récupération du signal GPS';\n    setTimeout(function(){\n      var commune = COMMUNES[Math.floor(Math.random()*COMMUNES.length)];\n      textEl.textContent = commune;\n      textEl.style.color = 'var(--text)';\n      subEl.textContent = 'Position détectée automatiquement';\n      boxEl.style.borderColor = 'rgba(var(--accent-rgb),.4)';\n      showToast('Localisation confirmée : ' + commune);\n    }, 900);\n  }\n\n  function submitInscription(){\n    var cgu = document.getElementById('cguCheck');\n    if(cgu && !cgu.checked){\n      showToast('Veuillez accepter les CGU pour continuer');\n      return;\n    }\n    var emailTab = document.querySelector('.insc-tab[data-method=\"email\"]');\n    var isEmail = emailTab && emailTab.classList.contains('active');\n    go(isEmail ? 'verification_email' : 'onboarding');\n  }\n\n  function setRating(n){\n    document.querySelectorAll('.star').forEach(function(s){\n      var v = parseInt(s.getAttribute('data-v'), 10);\n      s.style.color = v <= n ? 'var(--gold)' : 'rgba(var(--text-rgb),.2)';\n    });\n  }\n\n  function voteCategory(el, name){\n    document.querySelectorAll('.vote-opt').forEach(function(o){ o.style.opacity = '.5'; o.style.pointerEvents = 'none'; });\n    el.style.opacity = '1';\n    el.style.borderWidth = '2px';\n    document.getElementById('voteThanks').style.display = 'block';\n  }\n\n  function setPayOpt(el){\n    document.querySelectorAll('.pay-opt').forEach(function(o){ o.classList.remove('active'); o.style.borderColor = 'rgba(var(--accent-rgb),.14)'; });\n    el.classList.add('active');\n    el.style.borderColor = 'rgba(var(--accent-rgb),.4)';\n  }\n\n  function setPayOpt2(el){\n    document.querySelectorAll('.pay-opt2').forEach(function(o){ o.classList.remove('active'); o.style.borderColor = 'rgba(var(--accent-rgb),.14)'; });\n    el.classList.add('active');\n    el.style.borderColor = 'rgba(var(--accent-rgb),.4)';\n  }\n\n  function setLang(el){\n    document.querySelectorAll('.lang-opt').forEach(function(o){\n      o.classList.remove('active');\n      o.style.borderColor = 'rgba(var(--accent-rgb),.14)';\n      var check = o.querySelector('svg');\n      if(check) check.remove();\n    });\n    el.classList.add('active');\n    el.style.borderColor = 'rgba(var(--accent-rgb),.4)';\n    if(!el.querySelector('svg')){\n      el.insertAdjacentHTML('beforeend', '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2.5\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>');\n    }\n    showToast('Langue : ' + el.querySelector('span').textContent);\n  }\n\n  function toggleSwitch(el){\n    var on = el.getAttribute('data-on') === '1';\n    var dot = el.querySelector('div');\n    if(on){\n      el.setAttribute('data-on','0');\n      el.style.background = 'rgba(var(--text-rgb),.2)';\n      dot.style.left = '2px'; dot.style.right = 'auto';\n    } else {\n      el.setAttribute('data-on','1');\n      el.style.background = 'var(--accent)';\n      dot.style.right = '2px'; dot.style.left = 'auto';\n    }\n  }\n\n  var isOffline = false;\n  function toggleOffline(){\n    isOffline = !isOffline;\n    var stage = document.getElementById('stage');\n    var existing = document.getElementById('offlineBanner');\n    if(isOffline){\n      if(!existing){\n        var banner = document.createElement('div');\n        banner.id = 'offlineBanner';\n        banner.style.cssText = 'position:absolute;top:50px;left:0;right:0;z-index:50;background:var(--gold);color:#1A1200;font:600 11px \\'Space Grotesk\\';text-align:center;padding:7px;';\n        banner.textContent = '⚠ Mode hors-ligne — vos actions seront synchronisées automatiquement';\n        stage.appendChild(banner);\n      }\n      showToast('Mode hors-ligne activé');\n    } else {\n      if(existing) existing.remove();\n      showToast('Connexion rétablie — synchronisation en cours');\n    }\n    document.querySelectorAll('.offline-toggle').forEach(function(btn){ btn.style.color = isOffline ? 'var(--gold)' : 'var(--soft)'; });\n  }\n\n  function toggleOfflineSwitch(el){\n    toggleSwitch(el);\n    toggleOffline();\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
